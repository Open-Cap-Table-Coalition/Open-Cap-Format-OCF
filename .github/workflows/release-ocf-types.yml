name: Release OCF Types (tarball)

# Interim distribution: build the @opencaptablecoalition/ocf-types package and
# attach the tarball to the tag's GitHub Release. No npm-registry publish yet —
# when the npm org and trusted publisher are in place, swap the final step for
# `npm publish --provenance` (add `permissions: id-token: write`). The package
# folder and build steps stay identical.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # create/update the tag's Release and upload the tarball

jobs:
  pack:
    name: Pack and attach OCF types tarball
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2.4.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install Dependencies
        run: npm install

      - name: Generate types into the package
        run: npm run schema:gen-types -- --out packages/ocf-types/index.d.ts --fail-on-warnings

      - name: Pin package version to the tag
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: packages/ocf-types
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Pack
        working-directory: packages/ocf-types
        run: npm pack

      # Always produce an inspectable artifact (manual runs included).
      - name: Upload tarball as a workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ocf-types-tarball
          path: packages/ocf-types/*.tgz

      # On a tag, attach the same tarball to that tag's GitHub Release.
      - name: Attach tarball to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        working-directory: packages/ocf-types
        run: |
          gh release upload "$GITHUB_REF_NAME" ./*.tgz --clobber \
            || gh release create "$GITHUB_REF_NAME" ./*.tgz \
                 --title "$GITHUB_REF_NAME" \
                 --notes "OCF TypeScript types for $GITHUB_REF_NAME."
